<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Zenir - Gerador de Orçamentos</title>
    <!-- Tailwind CSS para o layout da página inicial -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Importação de fontes modernas e limpas do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- Ícones Lucide para botões mais atrativos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Variáveis de cores da Zenir */
        :root {
            --zenir-blue: #004a99;
            --zenir-red: #e30613;
            --gray-light: #f8fafc;
            --gray-border: #cbd5e1;
            --text-dark: #1e293b;
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Inter', sans-serif; /* Fonte mais moderna que a Roboto */
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* --- ESTILOS MODERNOS DOS CARTÕES --- */
        .card {
            border: 1px solid var(--gray-border);
            padding: 12px 16px; 
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
            justify-content: space-between;
            background: white;
            margin-right: -1px; 
            margin-bottom: -1px;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        /* Detalhe vermelho no topo do cartão para identidade visual */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background-color: var(--zenir-red);
        }

        .header-section {
            padding-bottom: 6px;
            margin-bottom: 6px;
            margin-top: 4px;
        }

        .logo-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        /* Área do Vendedor (Esquerda) */
        .seller-info {
            text-align: left;
            color: var(--text-dark);
            max-width: 70%;
            line-height: 1.2;
        }

        .label-vendedor {
            font-size: 0.55rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            display: inline-block;
            background: var(--gray-light);
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 4px;
        }

        .vendedor-nome {
            font-size: 1.15rem;
            font-weight: 900;
            color: var(--zenir-blue);
            display: block;
            text-transform: uppercase;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.1;
        }

        .vendedor-tel {
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Área do Logo (Direita) */
        .logo-div {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .logo-brand {
            font-weight: 900;
            font-style: italic;
            color: var(--zenir-blue);
            font-size: 1.8rem;
            line-height: 0.8;
            letter-spacing: -1px;
        }
        
        .logo-subtitle {
            font-size: 0.45rem;
            font-weight: 700;
            color: var(--zenir-red);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* Campos de Preenchimento Modernizados */
        .field-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
            padding: 2px 0;
            gap: 2px;
        }

        .field-line {
            display: flex;
            align-items: flex-end;
            width: 100%;
            margin-bottom: 3px;
        }

        .label {
            font-size: 0.65rem;
            font-weight: 700;
            margin-right: 6px;
            white-space: nowrap;
            color: #334155;
        }

        /* Linhas pontilhadas são mais modernas e limpas para preenchimento manual */
        .underline-full {
            border-bottom: 1.5px dotted #94a3b8;
            flex-grow: 1;
            height: 18px;
            font-size: 0.9rem;
            color: var(--zenir-blue);
            font-weight: bold;
        }

        /* Opções de pagamento como um bloco premium */
        .payment-options {
            display: flex;
            justify-content: space-between;
            font-size: 0.55rem;
            font-weight: 700;
            background-color: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 8px 6px;
            margin: 8px 0;
            color: #334155;
        }

        .payment-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .check-box {
            width: 10px;
            height: 10px;
            border: 1.5px solid #64748b;
            background-color: white;
            border-radius: 2px; /* Cantos levemente arredondados */
            display: inline-block;
        }

        /* --- CONFIGURAÇÕES DE IMPRESSÃO --- */
        @media print {
            @page {
                size: A4;
                margin: 0; 
            }
            
            body {
                margin: 0 !important;
                padding: 0 !important;
                background: white;
                display: block !important;
                /* Força a impressão de cores de fundo (como a barra vermelha e opções de pagamento) */
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .no-print { display: none !important; }

            .print-container {
                width: 202mm; 
                height: 292mm; 
                margin: 2.5mm auto 0 auto !important; 
                display: grid !important;
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: repeat(3, 1fr);
                gap: 0;
                box-sizing: border-box;
                overflow: hidden;
            }
            
            /* Bordas da Grelha de Impressão */
            .card {
                border-right: 1px solid #000;
                border-bottom: 1px solid #000;
                border-left: none;
                border-top: none;
                border-radius: 0; /* Remove cantos arredondados na impressão da grelha */
            }
            
            /* Fecho perfeito das bordas da grelha na folha */
            .print-container {
                border-top: 1px solid #000;
                border-left: 1px solid #000;
            }
        }

        /* --- UI TELA DO GERADOR --- */
        .form-card {
            max-width: 500px;
            width: 95%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px -5px rgba(0, 42, 100, 0.1);
            overflow: hidden;
            border-top: 6px solid var(--zenir-blue);
        }

        .btn-zenir {
            background-color: var(--zenir-blue);
            transition: all 0.2s ease-in-out;
        }
        .btn-zenir:hover { 
            background-color: #003a7a; 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 74, 153, 0.3);
        }

        .preview-area {
            width: 202mm;
            height: 292mm;
            background: white;
            margin: 30px auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 0;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border: 1px solid #cbd5e1;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col items-center">

    <!-- Seção de Configuração -->
    <div id="setupSection" class="no-print py-12 flex flex-col items-center w-full">
        
        <!-- Logo e Título Modernizados -->
        <div class="mb-8 text-center flex flex-col items-center">
            <div class="bg-blue-900 text-white w-20 h-20 rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-blue-900/30">
                <i data-lucide="layout-grid" class="w-10 h-10"></i>
            </div>
            <h1 class="text-4xl font-black italic text-blue-900 leading-none">Zenir</h1>
            <p class="text-xs font-bold text-red-600 uppercase tracking-widest mt-1 mb-4">Móveis e Eletros</p>
            <h2 class="text-xl font-semibold text-gray-600">Gerador de Cartões de Orçamento</h2>
        </div>

        <!-- Formulário -->
        <div class="form-card p-8">
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">
                        <i data-lucide="user" class="inline w-3 h-3 mr-1"></i> Nome do Vendedor
                    </label>
                    <input type="text" id="vendedorInput" placeholder="EX: JOÃO DA SILVA" 
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none uppercase font-bold text-blue-900 transition-all">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">
                        <i data-lucide="phone" class="inline w-3 h-3 mr-1"></i> WhatsApp / Telefone
                    </label>
                    <input type="text" id="telInput" placeholder="(00) 00000-0000" maxlength="15"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-bold transition-all">
                </div>

                <button onclick="generateCards()" class="w-full btn-zenir text-white font-black py-4 rounded-xl flex items-center justify-center gap-3 mt-4">
                    <i data-lucide="printer" class="w-5 h-5"></i> GERAR IMPRESSÃO
                </button>
            </div>
        </div>
    </div>

    <!-- Barra de Ação (Aparece após gerar os cartões) -->
    <div id="actionSection" class="no-print hidden sticky top-0 w-full bg-white/95 backdrop-blur-sm border-b p-4 flex justify-center gap-4 z-50 shadow-sm">
        <button onclick="window.print()" class="bg-green-600 hover:bg-green-700 transition-colors text-white font-black px-8 py-3 rounded-lg shadow-lg flex items-center gap-2">
            <i data-lucide="printer" class="w-5 h-5"></i> IMPRIMIR AGORA
        </button>
        <button onclick="backToEdit()" class="bg-slate-200 hover:bg-slate-300 transition-colors text-slate-700 font-bold px-8 py-3 rounded-lg flex items-center gap-2">
            <i data-lucide="arrow-left" class="w-5 h-5"></i> VOLTAR
        </button>
    </div>

    <!-- Área onde os cartões serão renderizados -->
    <div id="printArea" class="preview-area hidden print-container"></div>

    <script>
        // Inicializar os ícones Lucide
        lucide.createIcons();

        const setupSection = document.getElementById('setupSection');
        const actionSection = document.getElementById('actionSection');
        const printArea = document.getElementById('printArea');
        const vendedorInput = document.getElementById('vendedorInput');
        const telInput = document.getElementById('telInput');

        // Máscara para o telefone (mantida e perfeita!)
        telInput.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, "");
            v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
            v = v.replace(/(\d)(\d{4})$/, "$1-$2");
            e.target.value = v;
        });

        // Força letras maiúsculas no nome
        vendedorInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.toUpperCase();
        });

        // Função Principal: Gera os cartões em HTML
        function generateCards() {
            const nome = vendedorInput.value.trim();
            const tel = telInput.value.trim();

            if (!nome) { 
                alert("Por favor, informe o nome do vendedor antes de continuar."); 
                vendedorInput.focus();
                return; 
            }

            let cardsHtml = '';
            // Criação do laço de repetição para os 9 cartões da folha A4
            for (let i = 0; i < 9; i++) {
                cardsHtml += `
                <div class="card">
                    <div class="header-section">
                        <div class="logo-row">
                            <!-- Lado Esquerdo: Vendedor (Destaque moderno) -->
                            <div class="seller-info">
                                <span class="label-vendedor">Vendedor</span>
                                <span class="vendedor-nome">${nome}</span>
                                <span class="vendedor-tel">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-phone"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                                    ${tel || '(____) _____-_____'}
                                </span>
                            </div>
                            
                            <!-- Lado Direito: Logo Zenir -->
                            <div class="logo-div">
                                <div class="logo-brand">Zenir</div>
                                <div class="logo-subtitle">Móveis e Eletros</div>
                            </div>
                        </div>
                    </div>

                    <div class="field-container">
                        <div class="field-line">
                            <span class="label">PV:</span>
                            <div class="underline-full"></div>
                        </div>
                        <div class="field-line">
                            <span class="label">CÓDIGO:</span>
                            <div class="underline-full"></div>
                        </div>
                        <div class="field-line">
                            <div class="underline-full"></div>
                        </div>

                        <!-- Opções de pagamento num bloco elegante -->
                        <div class="payment-options">
                            <div class="payment-item">AV <div class="check-box"></div></div>
                            <div class="payment-item">PIX <div class="check-box"></div></div>
                            <div class="payment-item">CRED <div class="check-box"></div></div>
                            <div class="payment-item">DEB <div class="check-box"></div></div>
                            <div class="payment-item">CARNÊ <div class="check-box"></div></div>
                            <div class="payment-item">FINANC. <div class="check-box"></div></div>
                        </div>

                        <div class="field-line">
                            <span class="label">TOTAL: R$</span>
                            <div class="underline-full"></div>
                        </div>
                        <div class="field-line">
                            <span class="label">PARCELA:</span>
                            <div class="underline-full"></div>
                        </div>
                        <div class="field-line">
                            <span class="label">ENTRADA:</span>
                            <div class="underline-full"></div>
                        </div>
                        <div class="field-line">
                            <span class="label">OBS:</span>
                            <div class="underline-full"></div>
                        </div>
                    </div>
                </div>`;
            }

            // Inserir os cartões gerados na área de visualização
            printArea.innerHTML = cardsHtml;
            
            // Alternar a visibilidade das secções
            setupSection.classList.add('hidden');
            actionSection.classList.remove('hidden');
            printArea.classList.remove('hidden');
            
            // Rolar suavemente para o topo do ecrã
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Função para voltar ao ecrã inicial e editar os dados
        function backToEdit() {
            setupSection.classList.remove('hidden');
            actionSection.classList.add('hidden');
            printArea.classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
